<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter text box</title>
  <style>
   
    .twitt{
      vertical-align: middle;
      width: 50px;
      height: 50px;
      border-radius: 100px;
      object-fit: cover;
      object-position: top;
    }
    .text-type{
      font-family: Arial;
      font-size: 15px;
      border: none;
    }
    .twitt-btn{
      margin-left: 40px;
      padding-left: 10px;
      padding-right: 10px;
      padding-bottom:8px;
      padding-top: 8px;
      font-weight: bold;
      background-color: rgba(2, 2, 212, 0.562);
      color:white;
      width: 60px;
      border-radius: 14px;
      border: none;
    }


  </style>
</head>
<body>
  <div class="frant">
    <img class="twitt" src="t.jpg"    >
  <input type="text" class="text-type"  placeholder="What&#39s happening ?">
<button class="twitt-btn">Tweet</button>

  </div>
    

 
</body>
</html>

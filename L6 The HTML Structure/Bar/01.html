<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Bar</title>
  <style>

    .txt{
      font-size: 20px;
      padding-top: 8px;
      padding-bottom: 8px;
      padding-left: 10px;
      border-radius: 6px;
      border-width: 1px;
      border-color: grey;
    }
.no-border{
  margin-left: 10px;
  width: 300px;
  border: none;
 border-radius: 8px;
 box-sizing: border-box;
box-shadow: 0.25px 0.25px 0.25px 0.50px grey;
padding-left: 4px;
padding-top: 5px;
padding-bottom: 5px;
}
.para{
  color: rgb(71, 61, 61);
}
.bar{
  margin-top: 0px;
  width: 340px;
  height: 20px;
  border-width: 2px;
  border-radius: 4px;
}
.pa{
  width: 400px;
  font-family:Arial ;
  font-size: 14px;
}
.btn{
  padding-left: 10px;
  padding-right: 10px;
  padding-top: 12px;
  padding-bottom: 12px;
  width: 350px;
  background-color: rgb(78, 78, 235);
  color: white;
  text-align: center;
  border-radius: 16px;
  border: none;
}

  </style>
</head>
<body>
  <input class="txt" type="text" placeholder="Search">
  <input class="no-border" type="text" placeholder="Search Goggle or type a URL">

  
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Img Loaded and shape</title>
<style>
  .pic{
    width: 200px;
    border-radius: 8px;
  }
.ig{
  width: 100px;
  height: 100px;
  object-fit: cover;
  object-position: center;
}
.circle{

width: 150px;
height: 150px;
  border-radius: 100px;
  object-fit: cover;
  object-position:center;
}
</style>
</head>
<body>
  <img class="pic" src="thumbnail-2.webp" alt="">
  <img class="ig" src="thumbnail-5.webp" alt="">
  <img class="circle" src="thumbnail-6.webp" alt="">
</body>
</html>

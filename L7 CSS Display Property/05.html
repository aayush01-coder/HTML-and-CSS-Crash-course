<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a ride from Uber</title>
  <style>
    .heading{
      margin-bottom: 20px;
      font-family: Arial;
      font-size: 30px;
      font-weight: bold;
    }
    .location{
      margin-bottom:10px ;
      padding-left: 10px;
      border: none;
      display: block;
      width: 350px;
      height: 30px;
      font-family: Arial;
      font-size: 13px;
      color: gray;
      background-color: beige;

    }
    .destination{
      margin-bottom:10px ;
      padding-left: 10px;
      border: none;
      display: block;
      width: 350px;
      height: 30px;
      font-family: Arial;
      font-size: 13px;
      color: gray;
      background-color: beige;
    }
    .request{
      vertical-align: top;
      display: inline-block;
      width: 110px;
      height: 30px;
      background-color: black;
      color: white;

    }
    .schedule{
      margin-left: 20px;
      vertical-align: top;
      display: inline-block;
      border: none;
      width: 150px;
      height: 30px;
      font-weight: bold;
      background-color:beige;
      color:black;
    }
  </style>
</head>
<body>
   <p class="heading">Request a ride now</p> 
   <input  class="location"  type="text"  placeholder="Enter pickup location">
   <input class="destination type="text"  placeholder="Enter destination">
   <button class="request">Request now</button>
   <button class="schedule">Schedule for later</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google log</title>
  <style>
    .text{
      padding: 6px;
      width: 400px;
      height: 30px;
      border-color: gray;
      border:1px solid rgb(209, 204, 204);
      border-radius: 40px;
      font-family: Arial;
      font-weight:bold ;
    }
    .logo{
      margin-left: 80px;
      width: 200px;
      align-items: center;
    }
    .g-search{
      border: none;
      vertical-align: top;
      margin-left: 90px;
      margin-top: 30px;
      padding: 10px;
    }
    .btn{
      border: none;
       vertical-align: top;
      margin-left: 10px;
      margin-top: 30px;
      padding: 10px;
    }
  </style>
</head>
<body>
 <div>
  <img src="picture/download.png" alt="" class="logo">
  <input class="text"  type="text" placeholder="Search Google or type a URl">
  </div>
  <div>
    <button class="g-search">Google Search</button>
    <button class="btn">I'm Felling Lucky</button>
  </div>
</body>
</html>

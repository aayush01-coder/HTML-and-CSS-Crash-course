

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback</title>

  <style>
    .view{
      padding-left: 10px;
      padding-bottom: 10px;
      width: 300px;
     border: 2px solid gray;
     border-width: 1px;
    }
    .square{
      margin-top: 20px;
      border: 1px solid red;
      background-color: red;
      width: 100px;
      height: 100px;
    }
    .circle{
      margin-top: 20px;
      width: 100px;
      height: 100px;
      border-radius: 100px;
      border: 1px solid green;
      background-color: green;
    }
    .stats{
       padding-left: 10px;
      padding-bottom: 10px;
      width: 350px;
     border: none;
     border-width: 1px;
     background-color: black;
    }
    .mid{
      padding-top: 20px;
      font-family: Arial;
      font-weight: bold;
      font-size: 20px;
      color: white;
    }
    .add{
      color: gray;
      width: 340px;
    }

    
  </style>
</head>
<body>
  <div class="view">
    <p class="para">Satisfied with our service?</p>
    <button class="btn-yes">Yes</button>
    <button class="btn-no">NO</button>
  </div>
  <div class="square"></div>
  <div class="circle"></div>
  <div class="stats">
    <p class="mid"> Install Youtube Music </p>
    <p class="add">Add Youtube Music to your desktop for quick and eassy access</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram follow pop up</title>
  <style>
    
    .profile-preview {
      display: inline-block;
      
    }

    .profile-pic{
      vertical-align: top;
      width: 70px;
      height: 70px;
      border-radius: 40px;
    }
    .profile-info {
      vertical-align: top;
      display: inline-block;
    }
    .profile-btn {
      display: inline-block;
      
    }

    .name{
      margin-top: 0px;
      margin-bottom: 0px;
      margin-left: 10px;
      vertical-align: top;
      font-family: Arial;
      font-weight: bold;
    }
    .she{
      margin-top: 4px;
      margin-left: 10px;
      margin-bottom: 0px;
      color: rgb(96,96,96);
    }
    .he{
      margin-top: 4px;
      margin-left: 10px;
      margin-bottom: 0px;
      color: rgb(96,96,96);
    }
    .pop {
      margin-top: 4px;
      margin-left: 10px;
      margin-bottom: 0px;
      color: rgb(96,96,96);
    }
    .btn {
      margin-left: 100px;
      margin-top: 20px;
      vertical-align: top;
      width: 70px;
      border-radius: 4px;
      border: none;
      font-weight: bold;
      color: white;
      background-color: rgb(0, 110, 255);
      padding: 6px;
    }
    .over-view{
      margin-top: 30px;
    }
    .btn2{
      margin-left: 60px;
      margin-top: 20px;
      vertical-align: top;
      width: 70px;
      border-radius: 4px;
      border: none;
      font-weight: bold;
      color: white;
      background-color: rgb(0, 110, 255);
      padding: 6px;
    }
    
    .btn3{
      margin-left: 50px;
      margin-top: 20px;
      vertical-align: top;
      width: 70px;
      border-radius: 4px;
      border: none;
      font-weight: bold;
      color: white;
      background-color: rgb(0, 110, 255);
      padding: 6px;
    }
    .profile-pic2 {
      vertical-align: top;
      width: 70px;
      height: 70px;
      border-radius: 100px;
      object-fit: cover;
      object-position: center;
    }
  </style>
</head>
<body>
  
  <div class="profile-preview">
    <img  class="profile-pic" src="images.jpeg" alt="">
  </div>
  <div class="profile-info">
    <div>
      <p class="name">Anamika</p>
    </div>
  
    <div>
      <p class="she">She is </p>
    </div>

    <div>
      <p class="pop">Popular</p>
    </div>
</div>
<div  class="profile-btn">
  <button class="btn">follow</button>
</div>

<!-- 2nd One Hardik Panday -->

<div class="profile-preview">

    </div>
  
    <div>

    </div>

    <div>
      <p class="pop"> and Popular</p>
    </div>
</div>
<div  class="profile-btn">
  <button class="btn2">follow</button>
</div>
</div>

</body>
</html>

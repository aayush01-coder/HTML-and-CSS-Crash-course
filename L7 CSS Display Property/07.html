<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create a Facebook Request page</title>
  <style>
  
    .view{
      margin-right: 10px;
      border: 2px solid rgb(212, 206, 206);
      border-radius: 5px;
      display: inline-block;
      
    }
    .picture{
    
      object-fit: cover;
      object-position: center;
      height: 200px;
      width: 150px;
    }
    .name{
       margin-top: 0px;
       margin-bottom: 0px;
       margin-left: 4px;
       font-family: Arial;
       font-weight: bold;
    }
    .element{
      margin-top: 0px;
      margin-left: 4px;
      color: rgb(96,96,96);
    }
    .btn{
      margin-bottom: 10px;
      margin-left: 4px;
      padding:10px ;
      width: 120px;
      background-color: rgb(0, 89, 255);
      color: white;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="view">
    <img class="picture" src="picture/download.jpeg" alt="">
    <p class="name">Olive</p>
    <p class="element">2 Mutual friends</p>
    <button class="btn">Add Friend</button>
  
  </div>
  <div class="view">
      <img class="picture" src="picture/02.jpeg" alt="">
    <p class="name">Tiger</p>
    <p class="element">3Mutual friends</p>
    <button class="btn">Add Friend</button>
  </div>
  </div>
  <div class="view">
      <img class="picture" src="picture/03.jpeg" alt="">
    <p class="name">Dogesh Bhai</p>
    <p class="element"> 5 Mutual friends</p>
    <button class="btn">Add Friend</button>
  </div>
  
</body>
</html>

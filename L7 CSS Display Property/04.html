<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up form</title>
  <Style>
    .first{
      padding-left: 6px;
      padding-right: 6px;
      padding-bottom: 10px;
      padding-top: 10px;
      border-width: 1px;
      border-radius: 6px;
      border-color: rgb(199, 195, 195);
      box-shadow: 0px 0px 0px 0.50px black;
    }
    .last{
      margin-left: 5px;
      padding-left: 6px;
      padding-right: 6px;
      padding-bottom: 10px;
      padding-top: 10px;
      border-width: 1px;
      border-radius: 6px;
      border-color: rgb(199, 195, 195);
       box-shadow: 0px 0px 0px 0.50px black;
    }
    .email{
      display: block;
      width: 346px;
      margin-top: 10px;
      padding-left: 6px;
      padding-right: 6px;
      padding-bottom: 10px;
      padding-top: 10px;
      border-width: 1px;
      border-radius: 6px;
      border-color: rgb(199, 195, 195);
      box-shadow: 0px 0px 0px 0.50px black;
    }
    .btn{
      margin-top: 10px;
      padding-top: 6px;
      padding-bottom: 6px;
      height: 35px;
      width: 360px;
      border-radius: 10px;
      border:none;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background-color: rgb(15, 125, 216);
    }
  </Style>
</head>
<body>
  <input class="first" type="text" placeholder="First name">
  <input  class="last" type="text" placeholder="Last name">  
  <input  class="email" type="text" placeholder="Email">
  <button class="btn">Sign Up</button>
</body>
</html>
